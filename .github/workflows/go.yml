name: Go

on: [push]

env:
  GO_VERSION: 'oldstable'

jobs:

  build:
    name: Build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - ubuntu-24.04-arm
        - macos-latest
        - windows-latest

    steps:

    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - run: go test ./...

    - name: Build all "main" packages
      shell: bash
      run: |
        go list -f '{{if (eq .Name "main")}}{{.ImportPath}} .{{slice .ImportPath (len .Module.Path)}}{{end}}' ./... | while read -r path dir; do
          [ -z "$path" ] && continue
          name=$(basename "$path")
          printf "building %s\t(%s)\n" "$name" "$dir"
          ( cd "$dir" && go build )
        done

  build-freebsd:
    name: Build (FreeBSD)
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v6

    - name: Build and Test
      uses: vmactions/freebsd-vm@d1e65811565151536c0c894fff74f06351ed26e6 # v1.4.5
      with:
        usesh: true
        copyback: false
        disable-cache: true

        prepare: |
          echo "::group::Install Go"
          pkg install -y go
          echo "::endgroup::"

        run: |
          echo "::group::Test"
          go test ./...
          echo "::endgroup::"

          echo "::group::Build all \"main\" packages"
          go list -f '{{if (eq .Name "main")}}{{.ImportPath}} .{{slice .ImportPath (len .Module.Path)}}{{end}}' ./... | while read -r path dir; do
            [ -z "$path" ] && continue
            name=$(basename "$path")
            printf "building %s\t(%s)\n" "$name" "$dir"
            ( cd "$dir" && go build )
          done
          echo "::endgroup::"

