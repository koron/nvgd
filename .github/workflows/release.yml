name: Release

on: [push]

permissions:
  contents: write

env:
  GO_VERSION: 'oldstable'

jobs:

  check:
    name: Check if the main package exists
    outputs:
      targets: ${{ steps.list.outputs.targets }}

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: List "main" packages to be released
      id: list
      run: |
        found=0
        echo "targets<<__END__" >> "$GITHUB_OUTPUT"
        main_packages=$(go list -f '{{if (eq .Name "main")}}{{.ImportPath}} .{{slice .ImportPath (len .Module.Path)}}{{end}}' ./...)
        while read -r path dir; do
          [ -z "$path" ] && continue
          name=$(basename "$path")
          if [ -f "$dir/.norelease" ] ; then
            printf "Skipped %s\t(%s), due to %s/.norelease found\n" "$name" "$dir" "$dir"
          else
            found=1
            echo "$name $dir $path" >> "$GITHUB_OUTPUT"
            printf "Added   %s\t(%s) to the release\n" "$name" "$dir"
          fi
        done <<EOF
        $main_packages
        EOF
        echo "__END__" >> "$GITHUB_OUTPUT"
        if [ $found -eq 0 ] ; then
          echo "⛔ No packages found to release"
        fi

  build:
    name: Build releases

    needs: check
    if: needs.check.outputs.targets != ''

    env:
      RELEASE_TARGETS: ${{needs.check.outputs.targets}}

    strategy:
      fail-fast: false
      matrix:
        include:
        - { os: macos-latest,     arch: amd64 }
        - { os: macos-latest,     arch: arm64 }
        - { os: ubuntu-24.04-arm, arch: arm64 }
        - { os: ubuntu-latest,    arch: amd64 }
        - { os: windows-latest,   arch: amd64 }

    runs-on: ${{ matrix.os }}

    steps:

    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Setup env
      id: setup
      shell: bash
      run: |
        export NAME="${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}"
        if [[ ${GITHUB_REF} =~ ^refs/tags/v[0-9]+\.[0-9]+ ]] ; then
          export VERSION=${GITHUB_REF_NAME}
        else
          export VERSION=SNAPSHOT
        fi
        echo "VERSION=${VERSION}" >> $GITHUB_ENV
        case ${{ matrix.os }} in
          ubuntu-*)
            export GOOS=linux
            export PKGEXT=.tar.gz
            ;;
          macos-*)
            export GOOS=darwin
            export PKGEXT=.zip
            ;;
          windows-*)
            choco install zip
            export GOOS=windows
            export PKGEXT=.zip
            ;;
        esac
        export GOARCH=${{ matrix.arch }}
        echo "GOOS=${GOOS}" >> $GITHUB_ENV
        echo "GOARCH=${GOARCH}" >> $GITHUB_ENV
        echo "CGO_ENABLED=1" >> $GITHUB_ENV
        echo "PKGNAME=${NAME}_${VERSION}_${GOOS}_${GOARCH}" >> $GITHUB_ENV
        echo "PKGEXT=${PKGEXT}" >> $GITHUB_ENV

    - name: Build all "main" packages
      shell: bash
      run: |
        while read -r name dir path ; do
          printf "building %s\t(%s)\n" "$name" "$dir"
          ( cd "$dir" && go build )
        done <<EOF
        $RELEASE_TARGETS
        EOF

    - name: Archive
      shell: bash
      run: |
        mkdir -p _build/${PKGNAME}

        while read -r name dir path ; do
          cp "$dir/$name" _build/${PKGNAME}
        done <<EOF
        $RELEASE_TARGETS
        EOF

        cp -p LICENSE _build/${PKGNAME}
        cp -p README.md _build/${PKGNAME}

        case "${PKGEXT}" in
          ".tar.gz")
            tar caf _build/${PKGNAME}${PKGEXT} -C _build ${PKGNAME}
            ;;
          ".zip")
            (cd _build && zip -r9q ${PKGNAME}${PKGEXT} ${PKGNAME})
            ;;
        esac
        ls -laFR _build

    - name: Artifact upload
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.GOOS }}_${{ env.GOARCH }}
        path: _build/${{ env.PKGNAME }}${{ env.PKGEXT }}

  build-freebsd:
    name: Build FreeBSD release

    needs: check
    if: needs.check.outputs.targets != ''

    env:
      RELEASE_TARGETS: ${{needs.check.outputs.targets}}

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v6

    - name: Setup env
      id: setup
      shell: bash
      run: |
        export NAME="${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}"
        if [[ ${GITHUB_REF} =~ ^refs/tags/v[0-9]+\.[0-9]+ ]] ; then
          export VERSION=${GITHUB_REF_NAME}
        else
          export VERSION=SNAPSHOT
        fi

        export GOOS=freebsd
        export GOARCH=amd64
        export PKGEXT=.tar.gz

        echo "GOOS=${GOOS}" >> $GITHUB_ENV
        echo "GOARCH=${GOARCH}" >> $GITHUB_ENV
        echo "PKGNAME=${NAME}_${VERSION}_${GOOS}_${GOARCH}" >> $GITHUB_ENV
        echo "PKGEXT=${PKGEXT}" >> $GITHUB_ENV

    - name: Build on FreeBSD
      uses: vmactions/freebsd-vm@d1e65811565151536c0c894fff74f06351ed26e6 # v1.4.5
      with:
        usesh: true
        copyback: true
        disable-cache: true

        envs: 'RELEASE_TARGETS PKGNAME PKGEXT'

        prepare: |
          echo "::group::Install Go"
          pkg install -y go

        run: |
          echo "::group::Build"
          while read -r name dir path ; do
            printf "building %s\t(%s)\n" "$name" "$dir"
            ( cd "$dir" && go build )
          done <<EOF
          $RELEASE_TARGETS
          EOF

    - name: Archive
      run: |
        mkdir -p _build/${PKGNAME}

        while read -r name dir path ; do
          cp "$dir/$name" _build/${PKGNAME}
        done <<EOF
        $RELEASE_TARGETS
        EOF

        cp -p LICENSE _build/${PKGNAME}
        cp -p README.md _build/${PKGNAME}

        tar caf _build/${PKGNAME}${PKGEXT} -C _build ${PKGNAME}
        ls -laFR _build

    - name: Artifact upload
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.GOOS }}_${{ env.GOARCH }}
        path: _build/${{ env.PKGNAME }}${{ env.PKGEXT }}

  create-release:
    name: Create release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
    - build
    - build-freebsd
    steps:
    - uses: actions/download-artifact@v8
      with: { name: darwin_amd64 }
    - uses: actions/download-artifact@v8
      with: { name: darwin_arm64 }
    - uses: actions/download-artifact@v8
      with: { name: freebsd_amd64 }
    - uses: actions/download-artifact@v8
      with: { name: linux_amd64 }
    - uses: actions/download-artifact@v8
      with: { name: linux_arm64 }
    - uses: actions/download-artifact@v8
      with: { name: windows_amd64 }
    - run: ls -lafR
    - name: Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        draft: true
        prerelease: ${{ contains(github.ref_name, '-alpha.') || contains(github.ref_name, '-beta.') }}
        files: |
          *.tar.gz
          *.zip
        fail_on_unmatched_files: true
        generate_release_notes: true
        append_body: true

