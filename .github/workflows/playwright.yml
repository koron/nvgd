name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install npm dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium firefox

    - name: Build nvgd
      run: go build -o nvgd .

    - name: Start nvgd
      run: |
        ./nvgd -c tests/fixtures/nvgd.conf.yml > nvgd.log 2>&1 &
        echo $! > nvgd.pid
        # Wait for the server to accept connections (up to 30s).
        for i in $(seq 1 30); do
          if curl -fsS http://127.0.0.1:9280/version/ > /dev/null; then
            echo "nvgd is up"; break
          fi
          sleep 1
        done

    - name: Run Playwright tests
      run: npx playwright test

    - name: Stop nvgd
      if: ${{ always() }}
      run: |
        if [ -f nvgd.pid ]; then kill $(cat nvgd.pid) || true; fi

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: nvgd-log
        path: nvgd.log
        retention-days: 7
